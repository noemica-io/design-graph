<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>Design Graph — Open a canvas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600&family=Fraunces:ital,wght@0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:          #fafaf7;
    --ink:         #111113;
    --ink-2:       rgba(17,17,19,0.72);
    --muted:       rgba(17,17,19,0.52);
    --dim:         rgba(17,17,19,0.34);
    --faint:       rgba(17,17,19,0.18);
    --hairline:    rgba(17,17,19,0.10);
    --hairline-s:  rgba(17,17,19,0.06);
    --surface:     #ffffff;
    --accent:      #7c3aed;
    --accent-soft: rgba(124,58,237,0.10);
  }

  html, body {
    width: 1280px; height: 800px;
    overflow: hidden;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-feature-settings: 'cv11','ss01','ss03';
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    letter-spacing: -0.006em;
    position: relative;
  }

  /* Subtle dotted grid background */
  body::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 1px 1px, rgba(17,17,19,0.09) 1px, transparent 0);
    background-size: 22px 22px;
    opacity: 0.35; /* ~4% effective after dot alpha */
    pointer-events: none;
  }

  /* Status pill — top right */
  .status {
    position: absolute;
    top: 20px; right: 22px;
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 11px;
    color: var(--muted);
    font-weight: 450;
    letter-spacing: 0;
    font-variant-numeric: tabular-nums;
    background: rgba(255,255,255,0.6);
    border: 1px solid var(--hairline-s);
    border-radius: 100px;
    padding: 5px 11px;
    z-index: 5;
  }
  .status .dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: #16a34a;
    box-shadow: 0 0 0 3px rgba(22,163,74,0.14);
  }
  .status .sep { color: var(--faint); }
  .status .ver { color: var(--ink-2); font-weight: 500; }

  /* Centered card */
  .card {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 360px;
    display: flex; flex-direction: column;
    align-items: stretch;
    z-index: 4;
  }

  /* Logo */
  .logo-row {
    display: flex; justify-content: center; align-items: center; gap: 9px;
    margin-bottom: 44px;
  }
  .logo {
    width: 18px; height: 18px; border-radius: 5px;
    background: var(--accent);
    position: relative;
  }
  .logo::before, .logo::after {
    content: ''; position: absolute;
    width: 5px; height: 5px; border-radius: 50%;
    background: #fff;
  }
  .logo::before { top: 4px; left: 4px; }
  .logo::after { bottom: 4px; right: 4px; box-shadow: -5px 0 0 #fff; }
  .wordmark {
    font-size: 13px; font-weight: 600; letter-spacing: -0.012em;
    color: var(--ink);
  }

  h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 30px;
    font-weight: 500;
    letter-spacing: -0.02em;
    color: var(--ink);
    text-align: center;
    margin-bottom: 10px;
    line-height: 1.1;
  }

  .subtitle {
    font-family: 'Fraunces', Georgia, serif;
    font-style: italic;
    font-weight: 400;
    font-size: 14px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 32px;
    line-height: 1.4;
    letter-spacing: -0.005em;
  }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 10px;
    height: 44px;
    width: 100%;
    border-radius: 100px;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: -0.005em;
    cursor: default;
    border: 1px solid transparent;
    background: transparent;
    font-family: inherit;
  }
  .btn.primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    margin-bottom: 10px;
  }
  .btn.secondary {
    background: var(--surface);
    color: var(--ink);
    border-color: var(--hairline);
  }
  .btn .ic {
    width: 16px; height: 16px;
    display: inline-flex; align-items: center; justify-content: center;
  }

  /* Divider */
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 20px 0;
    font-size: 11px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 500;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--hairline-s);
  }

  /* Email input */
  .email-field {
    display: flex; align-items: center;
    height: 44px;
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: 100px;
    padding: 0 4px 0 18px;
    transition: border-color .15s;
  }
  .email-field:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .email-field input {
    flex: 1;
    border: none; outline: none;
    font-family: inherit;
    font-size: 13.5px;
    color: var(--ink);
    background: transparent;
    letter-spacing: -0.005em;
  }
  .email-field input::placeholder {
    color: var(--muted);
  }
  .email-field .submit {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--ink);
    color: #fff;
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    border: none;
    cursor: default;
  }
  .email-field .submit svg {
    width: 14px; height: 14px;
  }

  /* Fine print */
  .fineprint {
    margin-top: 18px;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    line-height: 1.5;
    letter-spacing: 0;
  }
  .fineprint a {
    color: var(--ink-2);
    text-decoration: underline;
    text-decoration-color: var(--faint);
    text-underline-offset: 2px;
  }

  /* Bottom paste hint */
  .paste-hint {
    position: absolute;
    bottom: 28px; left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: var(--muted);
    display: inline-flex; align-items: center; gap: 8px;
    font-weight: 450;
    letter-spacing: -0.003em;
    z-index: 4;
  }
  .paste-hint .kbd {
    display: inline-flex; align-items: center;
    padding: 2px 6px;
    border-radius: 4px;
    background: var(--surface);
    border: 1px solid var(--hairline);
    font-family: 'ui-monospace','SF Mono',Menlo,monospace;
    font-size: 10.5px;
    color: var(--ink-2);
    box-shadow: 0 1px 0 rgba(17,17,19,0.03);
    letter-spacing: 0;
  }
</style>
</head>
<body>

<!-- Status pill top-right -->
<div class="status">
  <span class="dot"></span>
  <span class="ver">v0.4.2</span>
  <span class="sep">·</span>
  <span>3,200 canvases made this week</span>
</div>

<!-- Centered card -->
<div class="card">

  <div class="logo-row">
    <div class="logo"></div>
    <div class="wordmark">Design Graph</div>
  </div>

  <h1>Open a canvas</h1>
  <p class="subtitle">One account. Every canvas you make stays yours.</p>

  <button class="btn primary">
    <span class="ic">
      <svg width="16" height="16" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path fill="#fff" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" opacity=".95"/>
        <path fill="#fff" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" opacity=".85"/>
        <path fill="#fff" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" opacity=".75"/>
        <path fill="#fff" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" opacity=".9"/>
      </svg>
    </span>
    Continue with Google
  </button>

  <button class="btn secondary">
    <span class="ic">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
      </svg>
    </span>
    Continue with GitHub
  </button>

  <div class="divider">or</div>

  <div class="email-field">
    <input type="email" placeholder="Email for magic link" value="">
    <button class="submit" aria-label="Send magic link">
      <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 7H11M11 7L7.5 3.5M11 7L7.5 10.5" stroke="#fff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <p class="fineprint">
    By continuing you agree to our <a href="#">terms</a> &amp; <a href="#">privacy</a>.
  </p>

</div>

<!-- Bottom paste hint -->
<div class="paste-hint">
  Already in? Just paste your canvas URL.
  <span class="kbd">⌘V</span>
</div>

</body>
</html>
